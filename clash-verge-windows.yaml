# 本文件完整接管规则顺序：系统与私有网络优先，随后广告和桌面应用，最后国内外分流。
rules:
  - DOMAIN-SUFFIX,ts.net,DIRECT
  - DOMAIN-SUFFIX,tailscale.com,DIRECT
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - IP-CIDR6,fd7a:115c:a1e0::/48,DIRECT,no-resolve
  - DOMAIN,dns.msftncsi.com,DIRECT
  - DOMAIN,www.msftncsi.com,DIRECT
  - DOMAIN,www.msftconnecttest.com,DIRECT
  - DOMAIN,ipv6.msftconnecttest.com,DIRECT
  - RULE-SET,Windows-Private-Domain,DIRECT
  - RULE-SET,Windows-Private-IP,DIRECT,no-resolve
  - RULE-SET,Cats-Team-AdRules,REJECT
  - RULE-SET,Windows-Microsoft-CN,DIRECT
  - RULE-SET,Windows-Steam-CN,DIRECT
  - RULE-SET,Windows-Apple-CN,DIRECT
  - RULE-SET,Windows-OpenAI,Windows-OpenAI
  - RULE-SET,Windows-GitHub,Windows-GitHub
  - RULE-SET,Windows-OneDrive,Windows-OneDrive
  - RULE-SET,Windows-Microsoft,Windows-Microsoft
  - RULE-SET,Windows-Steam,Windows-Steam
  - RULE-SET,Windows-Apple,Windows-Apple
  - RULE-SET,Windows-YouTube,Windows-YouTube
  - RULE-SET,Windows-Spotify,Windows-Spotify
  - RULE-SET,Windows-Telegram-Domain,Windows-Telegram
  - RULE-SET,Windows-Telegram-IP,Windows-Telegram,no-resolve
  - RULE-SET,Windows-CN-Domain,DIRECT
  - RULE-SET,Windows-NonCN-Domain,Windows-Proxy
  - RULE-SET,Windows-CN-IP,DIRECT,no-resolve
  - MATCH,Windows-Proxy
