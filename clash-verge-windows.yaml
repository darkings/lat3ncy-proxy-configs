# Clash Verge Rev / Mihomo Windows 单 YAML 扩展配置
# 关联到现有节点订阅使用；节点由订阅提供，本文件接管策略组与分流规则。
# 不包含私人节点、订阅地址、密码或 Token。

mixed-port: 7897
allow-lan: false
mode: rule
ipv6: true
log-level: warning
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "localhost.ptlogin2.qq.com"
    - "*.msftncsi.com"
    - "www.msftconnecttest.com"
    - "+.ts.net"
    - "+.tailscale.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    "+.ts.net": system
    "+.tailscale.com": system
  respect-rules: false

# 默认采用系统代理，关闭 TUN，减少与 WSL、Tailscale 和虚拟网络的冲突。
tun:
  enable: false
  stack: mixed
  auto-route: true
  strict-route: false
  route-exclude-address:
    - 100.64.0.0/10
    - fd7a:115c:a1e0::/48

proxy-groups:
  - name: Windows-Auto
    type: url-test
    include-all: true
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    lazy: true

  - name: Windows-Proxy
    type: select
    proxies:
      - Windows-Auto
      - DIRECT
    include-all: true

  - name: Windows-Spotify
    type: select
    proxies:
      - Windows-Proxy
      - DIRECT
    include-all: true

  - name: Windows-Telegram
    type: select
    proxies:
      - Windows-Proxy
      - DIRECT
    include-all: true

  - name: Windows-OpenAI
    type: select
    proxies:
      - Windows-Proxy
      - DIRECT
    include-all: true

  - name: Windows-GitHub
    type: select
    proxies:
      - Windows-Proxy
      - DIRECT
    include-all: true

  - name: Windows-Microsoft
    type: select
    proxies:
      - Windows-Proxy
      - DIRECT
    include-all: true

  - name: Windows-OneDrive
    type: select
    proxies:
      - Windows-Proxy
      - DIRECT
    include-all: true

  - name: Windows-Steam
    type: select
    proxies:
      - Windows-Proxy
      - DIRECT
    include-all: true

  - name: Windows-Apple
    type: select
    proxies:
      - Windows-Proxy
      - DIRECT
    include-all: true

  - name: Windows-YouTube
    type: select
    proxies:
      - Windows-Proxy
      - DIRECT
    include-all: true

rule-providers:
  Cats-Team-AdRules:
    type: http
    behavior: domain
    format: mrs
    url: https://raw.githubusercontent.com/Cats-Team/AdRules/main/adrules-mihomo.mrs
    path: ./ruleset/cats-team-adrules.mrs
    interval: 21600
    proxy: Windows-Proxy

  Windows-Private-Domain:
