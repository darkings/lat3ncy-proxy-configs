# Clash Verge Rev / Mihomo Windows 远程扩展配置
# 只覆盖基础参数；数组、规则与规则提供器由 clash-verge-windows.js 安全合并。
# 关联到现有节点订阅使用，不包含私人节点或订阅地址。

mixed-port: 7897
allow-lan: false
mode: rule
ipv6: true
log-level: warning
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  respect-rules: false

# 不在远程配置中强制切换 TUN 开关；建议系统代理开启、TUN 关闭。
# 如需启用 TUN，保持 mixed 与非严格路由，Tailnet 排除项由扩展脚本合并。
tun:
  stack: mixed
  auto-route: true
  strict-route: false
