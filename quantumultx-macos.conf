# @ConfigName       Quantumult X macOS 本机专用配置
# @Platform         macOS 本机客户端（不作为局域网网关）
# @Authors          TG-Twilight, Cats-Team, blackmatrix7, fmz200, zqzess, app2smile, limbopro, lowking, ddgksf2013, Orz-3, Toperlock
# @GitHub           https://raw.githubusercontent.com/darkings/lat3ncy-proxy-configs/main/quantumultx-macos.conf
#
# 使用说明：
# 1. 节点订阅请在 Quantumult X 中单独添加，不要写入公开配置。
# 2. 本配置不包含 MITM 证书或密码；只在启用重写时使用 Mac 上已安装并信任的证书。
# 3. Tailscale 必须先启动；修改 excluded_routes 后建议重新连接 QX 与 Tailscale。

[general]
server_check_url = http://www.gstatic.com/generate_204
server_check_timeout = 3000

# 保留系统 DNS，使 macOS 与 Tailscale MagicDNS 可以接管 *.ts.net。
dns_exclusion_list = *.cmpassport.com, *.pingan.com.cn, *.cmbchina.com, *.ts.net, *.tailscale.com

# Tailscale IPv4 流量完全绕过 Quantumult X；组播地址同样不进入隧道。
excluded_routes = 239.255.255.250/32, 100.64.0.0/10

# 不配置 udp_drop_list。Tailscale 直连需要 UDP 41641，NAT 探测需要 UDP 3478。
# 不配置局域网监听、设备转发或 skip_src_ip。

[dns]
# 不使用 no-system / no-ipv6；MagicDNS 和 Tailscale IPv6 均依赖系统能力。
server = /*.ts.net/system
server = /*.tailscale.com/system
server = 223.5.5.5
server = 119.29.29.29
server = /*.icloud.com/119.29.29.29
server = /*.icloud.com.cn/119.29.29.29
server = /*.tencent.com/119.29.29.29
server = /*.weixin.com/119.29.29.29

[policy]
# 本机常用服务策略
static = 国内服务, direct, proxy, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/China.png
static = Microsoft, direct, 全球加速, 美国节点, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Microsoft.png
static = OpenAI, 日本节点, 韩国节点, 狮城节点, 美国节点, 全球加速, img-url=https://raw.githubusercontent.com/Toperlock/Quantumult/main/icon/ChatGPT.png
static = GitHub, 香港节点, 日本节点, 美国节点, 全球加速, direct, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/github.png
static = Telegram, 香港节点, 美国节点, 全球加速, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Telegram.png
static = Twitter, 香港节点, 美国节点, 全球加速, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Twitter.png
static = Instagram, 香港节点, 美国节点, 全球加速, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Instagram.png
static = YouTube, 香港节点, 台湾节点, 日本节点, 韩国节点, 狮城节点, 美国节点, 全球加速, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/YouTube.png
static = Netflix, 香港节点, 台湾节点, 日本节点, 韩国节点, 狮城节点, 美国节点, 全球加速, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Netflix.png
static = Spotify, 香港节点, 狮城节点, 美国节点, 全球加速, direct, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Spotify.png
static = Steam, direct, 香港节点, 日本节点, 美国节点, 全球加速, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Steam.png
static = TikTok, 台湾节点, 日本节点, 韩国节点, 全球加速, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/TikTok.png
static = 全球加速, 香港节点, 台湾节点, 日本节点, 韩国节点, 狮城节点, 美国节点, proxy, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png

# 地区自动测速组；节点由单独添加的订阅提供。
url-latency-benchmark = 香港节点, server-tag-regex=港|HK|(?i)Hong, check-interval=900, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png
url-latency-benchmark = 台湾节点, server-tag-regex=台|TW|(?i)Taiwan, check-interval=900, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png
url-latency-benchmark = 日本节点, server-tag-regex=日|JP|(?i)Japan, check-interval=900, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png
url-latency-benchmark = 韩国节点, server-tag-regex=韩|KR|(?i)Korea, check-interval=900, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/KR.png
url-latency-benchmark = 狮城节点, server-tag-regex=新|狮|獅|SG|(?i)Singapore, check-interval=900, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/SG.png
url-latency-benchmark = 美国节点, server-tag-regex=美|US|(?i)States|American, check-interval=900, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png

[server_local]
# 本机节点可放在此处；公开仓库保持为空。

[server_remote]
# 请在 Quantumult X 中单独添加私人节点订阅。
# 若订阅不是 Quantumult X 原生格式，请在 App 内为该订阅单独配置可信解析器。

[filter_local]
# Tailscale 必须位于所有广告、国内和代理规则之前。
ip-cidr, 100.64.0.0/10, direct
ip6-cidr, fd7a:115c:a1e0::/48, direct
host-suffix, ts.net, direct
host-suffix, tailscale.com, direct

# 本机与局域网地址直连。
ip-cidr, 10.0.0.0/8, direct
ip-cidr, 127.0.0.0/8, direct
ip-cidr, 169.254.0.0/16, direct
ip-cidr, 172.16.0.0/12, direct
ip-cidr, 192.168.0.0/16, direct
ip-cidr, 224.0.0.0/24, direct
ip6-cidr, fe80::/10, direct
ip6-cidr, fc00::/7, direct

# 中国版抖音直连；国际版 TikTok 由远程 TikTok 规则处理。
host-suffix, amemv.com, 国内服务
host-suffix, snssdk.com, 国内服务
host-suffix, douyin.com, 国内服务
host-suffix, douyinvod.com, 国内服务

final, 全球加速

[filter_remote]
# Cats-Team 是默认广告主规则；AWAvenue 作为轻量备用。不要同时启用两套规则。
https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-QuantumultX.list, tag=桌面基础广告拦截@AWAvenue, force-policy=reject, update-interval=21600, opt-parser=false, enabled=false
https://raw.githubusercontent.com/Cats-Team/AdRules/main/qx.conf, tag=重度广告拦截@Cats-Team, force-policy=reject, update-interval=21600, opt-parser=false, enabled=true

# 网页专项规则默认关闭，避免规则叠加和误杀。
https://limbopro.com/Adblock4limbo.list, tag=网页广告域名补充@limbopro, force-policy=reject, update-interval=172800, opt-parser=false, enabled=false

# 桌面常用服务分流（均为 Quantumult X 原生规则）。
