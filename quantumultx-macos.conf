[http_backend]
# 默认不启用 BoxJS HTTP Backend。

[mitm]
# 只声明 Tailscale 排除项，不在公开配置中保存证书或密码。
# 启用远程重写后，其 hostname 会由资源合并；证书需在 Mac 上单独生成并信任。
hostname = -*.ts.net, -*.tailscale.com
